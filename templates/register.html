<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Create account · TaskFlow</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="auth-body"><main class="auth-shell"><section class="auth-card"><a class="auth-brand" href="{{ url_for('login') }}"><span class="brand-mark">✓</span>TaskFlow</a><div class="auth-intro"><p class="eyebrow">Get started</p><h1>Create your account</h1><p>Your tasks stay private to your account.</p></div>{% with messages = get_flashed_messages(with_categories=true) %}{% for category, text in messages %}<p class="flash {{ category }}">{{ text }}</p>{% endfor %}{% endwith %}<form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label for="email">Email address</label><input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com"><label for="password">Password</label><input id="password" name="password" type="password" required minlength="8" maxlength="256" autocomplete="new-password" placeholder="At least 8 characters"><button class="primary-button form-button" type="submit">Create account</button></form><p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p></section><footer class="auth-footer"><a href="{{ url_for('privacy') }}">Privacy</a><a href="{{ url_for('terms') }}">Terms</a></footer></main></body></html>
