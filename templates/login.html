<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Log in · TaskFlow</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="auth-body"><main class="auth-shell"><section class="auth-card"><a class="auth-brand" href="{{ url_for('login') }}"><span class="brand-mark">✓</span>TaskFlow</a><div class="auth-intro"><p class="eyebrow">Welcome back</p><h1>Log in to your workspace</h1><p>Keep your tasks organized and in focus.</p></div>{% with messages = get_flashed_messages(with_categories=true) %}{% for category, text in messages %}<p class="flash {{ category }}">{{ text }}</p>{% endfor %}{% endwith %}<form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label for="email">Email address</label><input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com"><label for="password">Password</label><input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Your password"><button class="primary-button form-button" type="submit">Log in</button></form><p class="auth-switch">New to TaskFlow? <a href="{{ url_for('register') }}">Create an account</a></p></section><footer class="auth-footer"><a href="{{ url_for('privacy') }}">Privacy</a><a href="{{ url_for('terms') }}">Terms</a></footer></main></body></html>
